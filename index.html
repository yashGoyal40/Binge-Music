<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binge Music</title>
    <link rel="stylesheet" href="/binge music/style.css">
    <link rel="icon" href="/binge music/android-chrome-512x512.png" type="image/icon type">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="/binge music/fevicon2.png" alt="Binge Music">Binge Music</li>
            <li class="li">About</li>
            <li class="li1"><a href="/binge music/loginpage.html" target="_blank" >Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <div class="songList">
            <h1>Best of Indian Hip Hop </h1>

                </div>

                    <img src="/binge music/covers/2.jpg" alt="1">

                    <span class="inplayicon"><i id="4" class="far songItemPlay fa-2x fa-play-circle"></i></span>
                </div><div class="songItem">

                    <!-- <span class="songlistplay"><img src="/binge music/playing2.gif" width="42" alt="" id="gif" style="opacity:0;"></span> -->
                    <span class="timestamp">3:21</span>
                    <span class="inplayicon"><i id="5" class="far songItemPlay fa-2x fa-play-circle"></i></span>
                </div><div class="songItem">
                    <img src="/binge music/covers/6.jpg" alt="1">

                    <span class="inplayicon"><i id="6" class="far songItemPlay fa-2x fa-play-circle"></i></span>

                    <img src="/binge music/covers/7.jpg" alt="1">

                    <span class="timestamp">3:55</span>
                    <span class="inplayicon"><i id="7" class="far songItemPlay fa-2x fa-play-circle"></i></span>

                    <img src="/binge music/covers/8.jpg" alt="1">

                    <span class="inplayicon"><i id="8" class="far songItemPlay fa-2x fa-play-circle"></i></span>
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>
    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" max="100" value="0">
        <div class="icons">
            <!-- fontausomeIcons -->
            <i class="fas fa-3x fa-step-backward" id="previous"></i>
            <i class="far fa-3x fa-play-circle" id="masterPlay"></i>
            <i class="fas fa-3x fa-step-forward" id="next"></i>
        </div>
        <div class="songInfo">
            <img src="/binge music/playing.gif" width="67" alt="" id="gif" style="margin:12px 0px 0px 0px;"><span id="masterSongName"></span>
        </div>
    </div>
    <script src="https://kit.fontawesome.com/edd8616115.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>

</html>
